name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run lint
        run: python -m ruff check .

      - name: Run tests
        run: python -m pytest

      - name: Run code evaluation
        run: python -m evaluations.run_code_eval

      - name: Run production check
        run: python -m workflows.production_check
